<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candela 부속 합의서 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  /* 기존 디자인 스타일 유지 (생략 가능하나 일관성을 위해 포함) */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
  :root { --bg: #f4f6fb; --surface: #ffffff; --border: #e4e8f3; --accent: #6c4ff5; --text: #1a1d2e; --muted: #7a8099; --radius: 10px; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); padding: 32px 16px; }
  .container { max-width: 760px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; font-weight: 500; color: var(--muted); }
  input, textarea { background: #f9fafd; border: 1px solid var(--border); border-radius: 7px; padding: 10px; font-size: 13px; width: 100%; }
  .btn-generate { width: 100%; padding: 16px; background: linear-gradient(135deg, #3b7ef8, #6c4ff5); border: none; border-radius: var(--radius); color: white; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <header style="text-align:center; margin-bottom:30px;">
    <h1 style="font-size:24px;">부속 합의서 생성기</h1>
    <p style="color:var(--muted); font-size:13px;">구매계약 변경 내용을 입력하세요</p>
  </header>

  <div class="card">
    <div class="card-title">원 계약 정보</div>
    <div class="row">
      <div class="field">
        <label>구매계약서 번호</label>
        <input id="contract_no" type="text" placeholder="예) 20241206001">
      </div>
      <div class="field">
        <label>원 계약 체결일자</label>
        <input id="contract_date" type="text" placeholder="예) 2024년 12월 6일">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>부속 합의 일자</label>
        <input id="addon_date" type="date">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">구성품 변경 내역</div>
    <div class="field" style="margin-bottom:15px;">
      <label>변경 대상 구성품 (기존)</label>
      <textarea id="ori_items" placeholder="번호, 품명, 수량 순으로 입력"></textarea>
    </div>
    <div class="field">
      <label>변경 후 구성품 (신규)</label>
      <textarea id="new_items" placeholder="번호, 품명, 수량 순으로 입력"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">당사자 정보</div>
    <div class="row">
      <div class="field">
        <label>구매자(회사명)</label>
        <input id="buyer_name" type="text" placeholder="예) ㈜이노메드">
      </div>
      <div class="field">
        <label>최종 계약 금액(VAT 포함)</label>
        <input id="final_price" type="text" placeholder="예) 150,000,000원">
      </div>
    </div>
    <div class="field">
      <label>구매자 주소</label>
      <input id="buyer_addr" type="text">
    </div>
  </div>

  <button class="btn-generate" onclick="generateAddonDocx()">📄 부속합의서 Word 다운로드</button>
</div>

<script>
// 오늘 날짜 설정
document.getElementById('addon_date').value = new Date().toISOString().split('T')[0];

async function generateAddonDocx() {
  // 여기에 워드 파일(부속합의서 템플릿)의 Base64를 넣어야 합니다.
  const TEMPLATE_B64 = "여기에_새로운_부속합의서_워드파일_BASE64_입력"; 
  
  const fields = {
    '{{ contract_no }}': document.getElementById('contract_no').value,
    '{{ contract_date }}': document.getElementById('contract_date').value,
    '{{ addon_date }}': formatDate(document.getElementById('addon_date').value),
    '{{ ori_items }}': document.getElementById('ori_items').value,
    '{{ new_items }}': document.getElementById('new_items').value,
    '{{ final_price }}': document.getElementById('final_price').value,
    '{{ buyer_name }}': document.getElementById('buyer_name').value,
    '{{ buyer_addr }}': document.getElementById('buyer_addr').value,
  };

  // 기존과 동일한 JSZip 로직 실행...
  // (생략된 로직은 이전 코드의 generateDocx와 동일하게 작성)
  alert('TEMPLATE_B64 값을 넣으면 작동합니다.');
}

function formatDate(iso) {
  if(!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}
</script>
</body>
</html>

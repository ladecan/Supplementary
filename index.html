<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Candela 부속 합의서 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
  :root { --accent: #3b7ef8; --border: #e4e8f3; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6fb; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
  .card-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 15px; border-bottom: 2px solid #f0f2ff; padding-bottom: 5px; }
  .field { margin-bottom: 15px; }
  label { font-size: 12px; color: #7a8099; display: block; margin-bottom: 5px; }
  input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; box-sizing: border-box; }
  .selection-area { background: #f8faff; padding: 15px; border-radius: 8px; border: 1px dashed var(--accent); margin-bottom: 10px; }
  .btn-add { padding: 8px 15px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; margin-top: 10px; }
  .btn-generate { width: 100%; padding: 18px; background: linear-gradient(135deg, #3b7ef8, #6c4ff5); border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
  <h2 style="text-align:center;">부속 합의서 생성기</h2>

  <div class="field">
    <label>구매계약서 번호</label>
    <input id="contract_no" type="text" value="20241206001">
  </div>

  <div class="card-title">1. 변경 대상 구성품 (변경 전)</div>
  <div class="selection-area">
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
      <select id="ori_code" onchange="syncName('ori')">
        <option value="">-- 번호 선택 --</option>
        <option value="7123-CE-0650">7123-CE-0650</option>
        <option value="7123-CE-0632">7123-CE-0632</option>
        <option value="7123-CE-0652">7123-CE-0652</option>
        <option value="7123-CE-0653">7123-CE-0653</option>
        <option value="FIN100834">FIN100834</option>
      </select>
      <input id="ori_qty" type="number" value="1" placeholder="수량">
    </div>
    <input id="ori_name" type="text" readonly style="margin-top:10px; background:#eee;" placeholder="제품명 자동 입력">
    <button class="btn-add" onclick="addItem('ori')">리스트에 추가</button>
  </div>
  <textarea id="ori_items" rows="3" readonly></textarea>

  <div class="card-title" style="margin-top:20px;">2. 변경 후 구성품 (변경 후)</div>
  <div class="selection-area" style="background:#f0fff4; border-color:#2ecc71;">
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
      <select id="new_code" onchange="syncName('new')">
        <option value="">-- 번호 선택 --</option>
        <option value="FIN101958">FIN101958</option>
        <option value="7123-CE-0650">7123-CE-0650</option>
      </select>
      <input id="new_qty" type="number" value="1">
    </div>
    <input id="new_name" type="text" readonly style="margin-top:10px; background:#eee;">
    <button class="btn-add" style="background:#2ecc71;" onclick="addItem('new')">리스트에 추가</button>
  </div>
  <textarea id="new_items" rows="2" readonly></textarea>

  <div class="field" style="margin-top:20px;">
    <label>구매자명</label>
    <input id="buyer_name" type="text" value="㈜이노메드">
  </div>
  <div class="field">
    <label>최종 계약 금액</label>
    <input id="final_price" type="text" value="150,000,000원(VAT포함)">
  </div>

  <button class="btn-generate" onclick="generateDocx()">📄 부속 합의서 워드 다운로드</button>
</div>

<script>
const itemMap = {
  "7123-CE-0650": "GMPP DCD Small",
  "7123-CE-0632": "GMPP DCD Medium",
  "7123-CE-0652": "GMPP DCD Large",
  "7123-CE-0653": "GMPP ACC Large",
  "FIN100834": "Zimmer Cryo7",
  "FIN101958": "GMPP Modified LSDS Options Kit for DCD"
};

function syncName(type) {
  const code = document.getElementById(type + '_code').value;
  document.getElementById(type + '_name').value = itemMap[code] || "";
}

function addItem(type) {
  const code = document.getElementById(type + '_code').value;
  const name = document.getElementById(type + '_name').value;
  const qty = document.getElementById(type + '_qty').value;
  if(!code) return;
  const target = document.getElementById(type + '_items');
  target.value += (target.value ? '\n' : '') + `${code}, ${name}, ${qty}`;
}

async function generateDocx() {
  // 워드 바이너리 데이터를 안전하게 조각내어 저장 (에러 방지)
  const chunks = [
    "UEsDBBQAAAAIAI6pkVpTeZ7X6QEAADsHAAATAAAAd29yZC9kb2N1bWVudC54bWydU8tu2zAQvBfoPxBcG7IsO00EByga9FDkYCRoem9FSmSNoiCRlFIn/767pKiDRAsUCZAsZ3ZnZ7mS9uP1vGZfKAm68SNoJmEIDNre0LcfQR8en2VhaOnI0InGegRDeAmWb+fPX2a3N68p6S7OAsBshIDUoT7vQR+V0mXp/SgK0Iu2ZgQDe9Y29KKhbN36C0Y1eXUeAn3v+7XzAnS78v2aY0R6fC523U7L7/Tox1eU8NCOfAIn+3WfH6RkYJ3WIDy1e/A3RmiN96F/oX+kO9777fT9SshVwN/9Pz9C9R4M7Vp7NfP/uF26E/A70NfTshO2MhM9D/7A70BfD50Hh6n8O9mJPhYvUjK2D97Zq33X1F3D5uU/UEsDBBQAAAAIAI6pkVrG5+S7XAEAAL0CAAARAAAAd29yZC9zZXR0aW5ncy54bWydUdtu2zAMfR+wfxC897IsO3WCBnSCYUD7MMRofYC0TEYm0pGUpPnrp9hJAw8pYCRIsnzIOfKSuOf7885V2VvQYvI0EclWghAw0fIicR8S8/A4T0NCK0fVThTNEnPhA2f8fP3yZb7Z764it6v8AHAfRzB1KM970AelbFp6N4oD9Gz6MYSOnfUlvaopmbb8S0Yp+UceAn2P5uHkHeh07TfV9B663f77I2vK/Y73N6fXoI/vE0k7E3q887z96m/T3K6/C8/T2Zg082qA5949uP/xN0p4zK3mOaF/pH/SDff9O9N9Z6F/oH/SDfc73f0S8FfPnyb/U36C18Ev8An8vWq67mFpJuB3oO9m5SAmW9mXv+e3p2+nzsfz3H4XLyE0BvP6V7YREu4E68C5sI1r667i9fMvUEsDBBQAAAAIAI6pkVo5+vXQWgEAAL8CAAARAAAAd29yZC9zdHlsZXMueG1snVHbbtvAED0X6D8QXDt6ZVmOEjSoE9QI+jDEaH2AtEzGIdGRkaT566eYRQMPIWCEIsm7OnOOM6W8v56X7BeKAtv5EDTTKASCvjP07UPQh4enySAMI6shA3vWlvSipezS+gtGNXnzHgJ9D+bh5B3odO03lfQeut36+yPryv2O9zfH16DX7xNJu/Z4v7V78HdOeMyt5uGp3YM/LqM13oX+he6I77vP6eaXgL8G/u77N89fX8E38Dr4Ab5YV9P1D0tzAn4H+mZWDsJKZqrnyR/4LenzsfP0NLffxUuIrMG8/JVthIAbwTpwLmzjyrqrePv8C1RBAAAAAA=="
  ];
  const b64 = chunks.join("");

  try {
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    const zip = await JSZip.loadAsync(buf);
    let xml = await zip.file('word/document.xml').async('string');

    const data = {
      '{{ contract_no }}': document.getElementById('contract_no').value,
      '{{ ori_items }}': document.getElementById('ori_items').value.replace(/\n/g, '<w:br/>'),
      '{{ new_items }}': document.getElementById('new_items').value.replace(/\n/g, '<w:br/>'),
      '{{ final_price }}': document.getElementById('final_price').value,
      '{{ buyer_name }}': document.getElementById('buyer_name').value
    };

    for (const [key, val] of Object.entries(data)) {
      xml = xml.split(key).join(val);
    }

    zip.file('word/document.xml', xml);
    const content = await zip.generateAsync({ type: 'blob' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    link.download = `부속합의서_${document.getElementById('buyer_name').value}.docx`;
    link.click();
  } catch (e) {
    alert("데이터 처리 중 오류 발생: " + e.message);
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부속합의서 생성기 | Candela Korea</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
:root{
  --navy:#1e3a5f;--navy-lt:#e8edf5;--navy-xl:#f2f5fa;
  --gold:#b8966e;--gold-dk:#9a7a58;
  --surf:#fff;--bg:#f0eeeb;--bdr:#dbd6cf;--bdr-lt:#ece9e4;
  --tx:#1c1a18;--tx2:#4a4640;--tx3:#8a8480;
  --red:#8b2030;--red-lt:#faeaec;
  --grn:#2d5f3f;--grn-lt:#e6f2ec;
  --shl:0 12px 48px rgba(0,0,0,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--navy);color:#fff;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2);z-index:20}
.hd-brand{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;letter-spacing:.03em}
.btn-word{display:flex;align-items:center;gap:7px;padding:7px 18px;background:var(--gold);color:#fff;border:none;border-radius:5px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(184,150,110,.35)}
.btn-word:hover{background:var(--gold-dk);transform:translateY(-1px)}
.layout{display:grid;grid-template-columns:410px 1fr;flex:1;overflow:hidden}
.form-panel{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.form-scroll{flex:1;overflow-y:auto;padding:16px 18px}
.sec{margin-bottom:18px}
.sec-hd{font-size:9.5px;font-weight:700;color:var(--navy);padding-bottom:7px;border-bottom:1.5px solid var(--navy-lt);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.f{margin-bottom:8px}
.f label{display:block;font-size:10.5px;font-weight:500;color:var(--tx2);margin-bottom:3px}
.f input,.f select{width:100%;padding:6px 9px;border:1px solid var(--bdr);border-radius:5px;font-size:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.buyer-chips{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-size:11px;cursor:pointer}
.chip.on{border-color:var(--navy);background:var(--navy);color:#fff}
.tbl-hd{display:grid;grid-template-columns:138px 1fr 52px 26px;gap:5px;font-size:9.5px;font-weight:600;color:var(--tx3);margin-bottom:6px}
.item-r{display:grid;grid-template-columns:138px 1fr 52px 26px;gap:5px;margin-bottom:5px}
.item-r input{font-size:11px;padding:5px 6px;border:1px solid var(--bdr);border-radius:4px}
.btn-del{background:var(--red-lt);border:1px solid #e0c0c5;color:var(--red);cursor:pointer;border-radius:4px}
.btn-add{width:100%;padding:6px;border:1.5px dashed var(--bdr);background:transparent;font-size:11px;cursor:pointer}
.preview-panel{display:flex;flex-direction:column;background:#e4e0da;overflow:hidden}
.pbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:8px 20px;display:flex;align-items:center;justify-content:space-between}
.prev-scroll{flex:1;overflow-y:auto;padding:28px;display:flex;justify-content:center}
.doc{background:#fff;width:700px;min-height:900px;box-shadow:var(--shl);padding:55px 65px;font-family:'Noto Serif KR',serif;font-size:13px;line-height:1.6}
.doc-title{text-align:center;font-size:24px;font-weight:700;margin-bottom:22px}
.doc-meta-row{display:flex;margin-bottom:2px}
.doc-meta-lbl{width:130px}
.doc-tbl{width:100%;border-collapse:collapse;margin:10px 0;font-family:'Noto Sans KR',sans-serif}
.doc-tbl th, .doc-tbl td{border:1px solid #000;padding:5px;text-align:center}
.sig-tbl{width:100%;border-collapse:collapse;margin-top:20px;font-family:'Noto Sans KR',sans-serif}
.sig-tbl td{border:1px solid #000;padding:10px;vertical-align:top;line-height:1.8}
.toast{position:fixed;bottom:22px;right:22px;color:#fff;padding:10px 18px;border-radius:6px;font-size:12px;opacity:0;transition:all .28s;z-index:999;background:rgba(0,0,0,0.8)}
.toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="hd-brand">Syneron Candela Korea</div>
  <button class="btn-word" id="wBtn" onclick="exportWord()">Word로 저장</button>
</header>
<div class="layout">
  <aside class="form-panel">
    <div class="form-scroll">
      <div class="sec">
        <div class="sec-hd">기본 정보</div>
        <div class="f"><label>구매계약서 번호</label><input type="text" id="cNo" value="20241206001" oninput="render()"></div>
        <div class="row2">
          <div class="f"><label>계약서 체결일자</label><input type="date" id="cDate" value="2024-12-06" onchange="render()"></div>
          <div class="f"><label>부속합의 일자</label><input type="date" id="aDate" value="2026-03-25" onchange="render()"></div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-hd">변경 대상 구성품 (Before)</div>
        <div id="bRows"></div>
        <button class="btn-add" onclick="addRow('b')">＋ 행 추가</button>
      </div>
      <div class="sec">
        <div class="sec-hd">변경 후 구성품 (After)</div>
        <div id="aRows"></div>
        <button class="btn-add" onclick="addRow('a')">＋ 행 추가</button>
      </div>
      <div class="sec">
        <div class="sec-hd">최종 금액</div>
        <div class="f"><label>최종 계약 금액 (VAT포함)</label><input type="text" id="amt" value="150,000,000" oninput="render()"></div>
      </div>
      <div class="sec">
        <div class="sec-hd">구매자 정보</div>
        <div class="buyer-chips">
          <button class="chip on" onclick="setBuyer('inomed',this)">㈜이노메드</button>
          <button class="chip" onclick="setBuyer('custom',this)">직접 입력</button>
        </div>
        <div class="f"><label>구매자명</label><input type="text" id="bName" oninput="render()"></div>
        <div class="f"><label>주소</label><input type="text" id="bAddr" oninput="render()"></div>
      </div>
    </div>
  </aside>
  <main class="preview-panel">
    <div class="pbar"><span style="font-size:12px;font-weight:bold">미리보기</span></div>
    <div class="prev-scroll"><div class="doc" id="doc"></div></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const buyers = {
  inomed: { name:'㈜이노메드', addr:'경기도 김포시 고촌읍 아라육로 58번길 35-28 (담당: 김기훈)' },
  custom: { name:'', addr:'' }
};

let bItems = [{no:'7123-CE-0650', name:'GMPP DCD Small', qty:1}];
let aItems = [{no:'FIN101958', name:'GMPP Modified LSDS Options Kit for DCD', qty:2}];

function val(id){ return document.getElementById(id).value; }
function setVal(id, v){ document.getElementById(id).value = v; }

function addRow(type){
  const target = type === 'b' ? bItems : aItems;
  target.push({no:'', name:'', qty:1});
  render();
}

function delRow(type, idx){
  const target = type === 'b' ? bItems : aItems;
  if(target.length > 1) { target.splice(idx, 1); render(); }
}

function setBuyer(k, el){
  setVal('bName', buyers[k].name); setVal('bAddr', buyers[k].addr);
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on'); render();
}

function render(){
  // 입력 필드 업데이트 (생략 가능하지만 동기화 위해 유지)
  let bHtml = ''; bItems.forEach((it, i) => {
    bHtml += `<div class="item-r">
      <input type="text" value="${it.no}" oninput="bItems[${i}].no=this.value;render()">
      <input type="text" value="${it.name}" oninput="bItems[${i}].name=this.value;render()">
      <input type="number" value="${it.qty}" oninput="bItems[${i}].qty=this.value;render()">
      <button class="btn-del" onclick="delRow('b',${i})">×</button>
    </div>`;
  });
  document.getElementById('bRows').innerHTML = bHtml;

  let aHtml = ''; aItems.forEach((it, i) => {
    aHtml += `<div class="item-r">
      <input type="text" value="${it.no}" oninput="aItems[${i}].no=this.value;render()">
      <input type="text" value="${it.name}" oninput="aItems[${i}].name=this.value;render()">
      <input type="number" value="${it.qty}" oninput="aItems[${i}].qty=this.value;render()">
      <button class="btn-del" onclick="delRow('a',${i})">×</button>
    </div>`;
  });
  document.getElementById('aRows').innerHTML = aHtml;

  // 미리보기 생성 (실제 파일 형식 반영)
  const d = new Date(val('cDate'));
  const dStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  const ad = new Date(val('aDate'));
  const adStr = `${ad.getFullYear()}년 ${ad.getMonth()+1}월 ${ad.getDate()}일`;

  document.getElementById('doc').innerHTML = `
    <div class="doc-title">부 속 합 의 서</div>
    <div class="doc-meta">
      <div class="doc-meta-row"><span class="doc-meta-lbl">구매계약서 번호</span><span>: ${val('cNo')}</span></div>
      <div class="doc-meta-row"><span class="doc-meta-lbl">구매계약서 체결일자</span><span>: ${dStr}</span></div>
      <div class="doc-meta-row"><span class="doc-meta-lbl">부속 합의 일자</span><span>: ${adStr}</span></div>
    </div>
    <p style="margin-top:20px">위 합의된 구매계약서의 구성품 중 일부가 아래와 같이 변경되어 이에 대하여 다음과 같이 합의합니다.</p>
    <p style="font-weight:bold; margin-top:15px">변경 대상 구성품</p>
    <table class="doc-tbl">
      <tr><th>구성품 번호</th><th>구성품</th><th>수량</th></tr>
      ${bItems.map(it=>`<tr><td>${it.no}</td><td>${it.name}</td><td>${it.qty}</td></tr>`).join('')}
    </table>
    <p style="font-weight:bold; margin-top:15px">변경 후 구성품</p>
    <table class="doc-tbl">
      <tr><th>구성품 번호</th><th>구성품</th><th>수량</th></tr>
      ${aItems.map(it=>`<tr><td>${it.no}</td><td>${it.name}</td><td>${it.qty}</td></tr>`).join('')}
    </table>
    <p style="font-weight:bold; margin-top:15px">변경 후 최종 계약 금액 : ${val('amt')}원(VAT포함)</p>
    <p style="margin-top:15px; font-size:12px">본 부속합의서에 명시된 해당 구성품 변경 외의 구매계약서 상의 다른 조건은 여전히 유효하며...</p>
    <table class="sig-tbl">
      <tr>
        <td width="50%">회사: 시너론켄델라코리아 유한회사<br>주소: 서울시 서초구 강남대로 327 대륭서초타워 3층</td>
        <td width="50%">구매자: ${val('bName')}<br>주소: ${val('bAddr')}</td>
      </tr>
    </table>
  `;
}

// Word 저장 기능 (올려주신 워드 형식 그대로 적용)
async function exportWord() {
  const btn = document.getElementById('wBtn');
  btn.innerText = '생성 중...';
  try {
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle } = docx;
    
    const d = new Date(val('cDate'));
    const dStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
    const ad = new Date(val('aDate'));
    const adStr = `${ad.getFullYear()}년 ${ad.getMonth()+1}월 ${ad.getDate()}일`;

    const createCell = (txt, bold=false) => new TableCell({
      children: [new Paragraph({ children: [new TextRun({ text: String(txt), bold, size: 20 })], alignment: AlignmentType.CENTER })],
      verticalAlign: AlignmentType.CENTER
    });

    const doc2 = new Document({
      sections: [{
        children: [
          new Paragraph({ children: [new TextRun({ text: "부 속 합 의 서", bold: true, size: 36 })], alignment: AlignmentType.CENTER, spacing: { after: 300 } }),
          new Paragraph({ children: [new TextRun({ text: `구매계약서 번호 \t: ${val('cNo')}`, size: 22 })] }),
          new Paragraph({ children: [new TextRun({ text: `구매계약서 체결일자\t: ${dStr}`, size: 22 })] }),
          new Paragraph({ children: [new TextRun({ text: `부속 합의 일자 \t\t: ${adStr}`, size: 22 })], spacing: { after: 200 } }),
          new Paragraph({ children: [new TextRun({ text: '위 합의된 구매계약서의 구성품 중 일부가 아래와 같이 변경되어 이에 대하여 다음과 같이 합의합니다.', size: 20 })], spacing: { after: 200 } }),
          
          new Paragraph({ children: [new TextRun({ text: "변경 대상 구성품", bold: true, size: 22 })] }),
          new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: [
              new TableRow({ children: [createCell("구성품 번호", true), createCell("구성품", true), createCell("수량", true)] }),
              ...bItems.map(it => new TableRow({ children: [createCell(it.no), createCell(it.name), createCell(it.qty)] }))
            ]
          }),

          new Paragraph({ children: [new TextRun({ text: "변경 후 구성품", bold: true, size: 22 })], spacing: { before: 200 } }),
          new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: [
              new TableRow({ children: [createCell("구성품 번호", true), createCell("구성품", true), createCell("수량", true)] }),
              ...aItems.map(it => new TableRow({ children: [createCell(it.no), createCell(it.name), createCell(it.qty)] }))
            ]
          }),

          new Paragraph({ children: [new TextRun({ text: `변경 후 최종 계약 금액 : ${val('amt')}원(VAT포함)`, bold: true, size: 22 })], spacing: { before: 300, after: 200 } }),
          new Paragraph({ children: [new TextRun({ text: "본 부속합의서에 명시된 해당 구성품 변경 외의 구매계약서 상의 다른 조건은 여전히 유효하며 양 당사자에게 구속력을 갖습니다. 각 당사자의 적법하게 수권 받은 대표는 본 부속 합의서 2부를 체결하여 각 당사자가 한 부씩 보관하며, 직인이 날인된 순간부터 해당 부속 합의서의 효력이 발휘됩니다.", size: 18 })], spacing: { after: 400 } }),

          new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: [
              new TableRow({
                children: [
                  new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "회사: 시너론켄델라코리아 유한회사\n주      소: 서울시 서초구 강남대로 327 대륭서초타워 3층", size: 20 })] })] }),
                  new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: `구매자: ${val('bName')}\n주      소: ${val('bAddr')}`, size: 20 })] })] })
                ]
              })
            ]
          })
        ]
      }]
    });

    const blob = await Packer.toBlob(doc2);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `부속합의서_${val('bName')}.docx`;
    a.click();
  } catch (e) { alert('에러 발생: ' + e.message); }
  finally { btn.innerText = 'Word로 저장'; }
}
window.onload = () => { setBuyer('inomed', document.querySelectorAll('.chip')[0]); render(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>켄델라 코리아 메뉴 결정기</title>
    <style>
        :root { --primary-color: #004a99; --accent-color: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; text-align: center; background: #f8f9fa; color: #333; padding: 40px 20px; }
        
        .header-logo { max-width: 180px; margin-bottom: 10px; }
        h2 { margin-bottom: 30px; font-weight: 800; color: var(--primary-color); letter-spacing: -1px; }

        .roulette-outer { position: relative; width: 350px; height: 350px; margin: 0 auto 40px; }
        #canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
                  transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: white; }
        .arrow { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                  border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid var(--accent-color); z-index: 10; }

        .btn-spin { padding: 15px 60px; font-size: 20px; font-weight: bold; cursor: pointer; 
                    background: var(--primary-color); color: white; border: none; border-radius: 50px; 
                    box-shadow: 0 4px 15px rgba(0,74,153,0.3); transition: 0.3s; }
        .btn-spin:hover { transform: scale(1.05); background: #003670; }
        #result { margin-top: 25px; font-size: 28px; font-weight: bold; color: var(--accent-color); min-height: 40px; }

        .settings { max-width: 400px; margin: 50px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .menu-item { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-remove { background: #ff7675; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { width: 100%; padding: 12px; background: #f0f2f5; border: 2px dashed #cbd5e0; border-radius: 12px; cursor: pointer; margin-top: 10px; font-weight: 600; color: #666; }
        .btn-add:hover { background: #e2e8f0; }
    </style>
</head>
<body>

    <img src="https://img.sbs.co.kr/sbscnbc/upload/2018/10/01/10000612811.jpg" alt="Candela Korea Logo" class="header-logo">
    <h2>LUNCH ROULETTE</h2>

    <div class="roulette-outer">
        <div class="arrow"></div>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>
    
    <button class="btn-spin" onclick="rotate()">SPIN!</button>
    <div id="result"></div>

    <div class="settings">
        <h3 style="margin-top:0; font-size: 18px; color: #555;">메뉴 편집</h3>
        <div id="menu-list"></div>
        <button class="btn-add" onclick="addMenuItem()">+ 메뉴 추가</button>
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const resultDiv = document.getElementById("result");
        
        // 초기 메뉴 설정
        let menus = ["한식", "중식", "일식", "양식", "분식"];
        const colors = ["#ff7675", "#fdcb6e", "#55efc4", "#81ecec", "#74b9ff", "#a29bfe", "#ffeaa7", "#fab1a0"];

        function updateUI() {
            const list = document.getElementById("menu-list");
            list.innerHTML = "";
            menus.forEach((menu, i) => {
                const div = document.createElement("div");
                div.className = "menu-item";
                div.innerHTML = `
                    <input type="text" value="${menu}" onchange="updateMenu(${i}, this.value)">
                    <button class="btn-remove" onclick="removeMenuItem(${i})">✕</button>
                `;
                list.appendChild(div);
            });
            drawRoulette();
        }

        function updateMenu(index, value) {
            menus[index] = value;
            drawRoulette();
        }

        function addMenuItem() {
            menus.push("새 메뉴");
            updateUI();
        }

        function removeMenuItem(index) {
            if(menus.length <= 2) return alert("최소 2개 이상의 메뉴가 필요합니다.");
            menus.splice(index, 1);
            updateUI();
        }

        function drawRoulette() {
            const arc = (2 * Math.PI) / menus.length;
            ctx.clearRect(0, 0, 400, 400);

            menus.forEach((name, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, arc * i, arc * (i + 1));
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#333";
                ctx.translate(200, 200);
                ctx.rotate(arc * i + arc / 2);
                ctx.textAlign = "right";
                ctx.font = "bold 18px sans-serif";
                ctx.fillText(name, 180, 10);
                ctx.restore();
            });
        }

        let currentRotation = 0;
        let isSpinning = false;

        function rotate() {
            if (isSpinning) return;
            isSpinning = true;
            resultDiv.innerText = "메뉴 선정 중...";
            
            const randomDegree = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomDegree;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualDegree = (360 - (currentRotation % 360) + 270) % 360;
                const arcDegree = 360 / menus.length;
                const winnerIndex = Math.floor(actualDegree / arcDegree) % menus.length;
                
                resultDiv.innerText = `오늘의 추천: ${menus[winnerIndex]}!`;
            }, 4000);
        }

        updateUI();
    </script>
</body>
</html>

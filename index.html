<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>부속 합의서 작성 시스템</title>
    <script src="https://unpkg.com/docx@8.2.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; line-height: 1.6; background: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        input { padding: 8px; width: 250px; margin-bottom: 10px; border: 1px solid #ccc; }
        button { display: block; width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>부속 합의서 작성</h2>
    
    <div class="section">
        <h3>1. 기본 정보</h3>
        <label>계약서 번호:</label> <input type="text" id="contractNo" value="20241206001"><br>
        <label>계약 체결일:</label> <input type="text" id="contractDate" value="2024년 12월 6일"><br>
        <label>부속 합의일:</label> <input type="text" id="agreementDate" value="2026년 3월 25일">
    </div>

    <div class="section">
        <h3>2. 금액 정보</h3>
        <label>최종 계약 금액:</label> <input type="text" id="totalAmount" value="150,000,000원(VAT포함)">
    </div>

    <button onclick="generateDoc()">워드 파일(.docx) 다운로드</button>
</div>

<script>
    async function generateDoc() {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, Header, Footer } = docx;

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [new TextRun({ text: "부속 합의서", bold: true, size: 32 })]
                    }),
                    new Paragraph({ text: "" }),
                    new Paragraph({ children: [new TextRun({ text: `구매계약서 번호 : ${document.getElementById('contractNo').value}`, bold: true })] }),
                    new Paragraph({ children: [new TextRun({ text: `구매계약서 체결일자 : ${document.getElementById('contractDate').value}`, bold: true })] }),
                    new Paragraph({ children: [new TextRun({ text: `부속 합의 일자 : ${document.getElementById('agreementDate').value}`, bold: true })] }),
                    new Paragraph({ text: "" }),
                    new Paragraph({ text: "위 합의된 구매계약서의 구성품 중 일부가 아래와 같이 변경되어 이에 대하여 다음과 같이 합의합니다." }),
                    new Paragraph({ text: "" }),
                    
                    // 변경 대상 구성품 테이블
                    new Paragraph({ children: [new TextRun({ text: "[변경 대상 구성품]", bold: true })] }),
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph("구성품 번호")] }),
                                new TableCell({ children: [new Paragraph("구성품")] }),
                                new TableCell({ children: [new Paragraph("수량")] })
                            ]}),
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph("7123-CE-0650")] }),
                                new TableCell({ children: [new Paragraph("GMPP DCD Small")] }),
                                new TableCell({ children: [new Paragraph("1")] })
                            ]})
                        ]
                    }),
                    new Paragraph({ text: "" }),

                    // 변경 후 구성품 테이블
                    new Paragraph({ children: [new TextRun({ text: "[변경 후 구성품]", bold: true })] }),
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph("구성품 번호")] }),
                                new TableCell({ children: [new Paragraph("구성품")] }),
                                new TableCell({ children: [new Paragraph("수량")] })
                            ]}),
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph("FIN101958")] }),
                                new TableCell({ children: [new Paragraph("GMPP Modified LSDS Options Kit for DCD")] }),
                                new TableCell({ children: [new Paragraph("2")] })
                            ]})
                        ]
                    }),
                    new Paragraph({ text: "" }),
                    new Paragraph({ children: [new TextRun({ text: `변경 후 최종 계약 금액 : ${document.getElementById('totalAmount').value}`, bold: true })] }),
                    new Paragraph({ text: "" }),
                    new Paragraph({ text: "본 부속합의서에 명시된 해당 구성품 변경 외의 구매계약서 상의 다른 조건은 여전히 유효하며 양 당사자에게 구속력을 갖습니다." }),
                ]
            }]
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, "부속합의서_수정본.docx");
        });
    }
</script>

</body>
</html>

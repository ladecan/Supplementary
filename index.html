<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Candela 부속 합의서 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
  :root { --bg: #f4f6fb; --surface: #ffffff; --border: #e4e8f3; --accent: #6c4ff5; --text: #1a1d2e; --muted: #7a8099; --radius: 10px; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; }
  .card-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 11px; font-weight: 600; color: var(--muted); }
  input, select, textarea { border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 13px; background: #f9fafd; }
  
  /* 선택기 영역 */
  .selection-area { background: #f0f2ff; padding: 15px; border-radius: 8px; border: 1px dashed var(--accent); margin-top: 10px; }
  .btn-add { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 12px; }
  .btn-generate { width: 100%; padding: 18px; background: linear-gradient(135deg, #3b7ef8, #6c4ff5); border: none; border-radius: var(--radius); color: white; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 10px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  table th, table td { border: 1px solid var(--border); padding: 8px; text-align: center; }
  table th { background: #f4f6fb; color: var(--muted); }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-title">기본 정보</div>
    <div class="row">
      <div class="field"><label>구매계약서 번호</label><input id="contract_no" type="text" value="20241206001"></div>
      <div class="field"><label>원 계약 체결일자</label><input id="contract_date" type="text" value="2024년 12월 6일"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">1. 변경 대상 구성품 (변경 전)</div>
    <div class="selection-area">
      <div style="display:flex; gap:10px; align-items:flex-end;">
        <div style="flex:2;" class="field">
          <label>구성품 선택</label>
          <select id="ori_select">
            <option value="7123-CE-0650,GMPP DCD Small">7123-CE-0650 (GMPP DCD Small)</option>
            <option value="7123-CE-0632,GMPP DCD Medium">7123-CE-0632 (GMPP DCD Medium)</option>
            <option value="7123-CE-0653,GMPP ACC Large">7123-CE-0653 (GMPP ACC Large)</option>
          </select>
        </div>
        <div style="flex:0.5;" class="field"><label>수량</label><input id="ori_qty" type="number" value="1"></div>
        <button class="btn-add" onclick="addRow('ori')">항목 추가</button>
      </div>
    </div>
    <textarea id="ori_items" rows="4" style="margin-top:10px; width:100%;" placeholder="선택한 항목이 여기에 표시됩니다."></textarea>
  </div>

  <div class="card">
    <div class="card-title">2. 변경 후 구성품 (변경 후)</div>
    <div class="selection-area" style="background:#eefbff; border-color:#3b7ef8;">
      <div style="display:flex; gap:10px; align-items:flex-end;">
        <div style="flex:2;" class="field">
          <label>구성품 선택</label>
          <select id="new_select">
            <option value="FIN101958,GMPP Modified LSDS Options Kit for DCD">FIN101958 (Modified LSDS Kit)</option>
            <option value="7123-CE-0650,GMPP DCD Small">7123-CE-0650 (GMPP DCD Small)</option>
          </select>
        </div>
        <div style="flex:0.5;" class="field"><label>수량</label><input id="new_qty" type="number" value="2"></div>
        <button class="btn-add" style="background:#3b7ef8;" onclick="addRow('new')">항목 추가</button>
      </div>
    </div>
    <textarea id="new_items" rows="4" style="margin-top:10px; width:100%;" placeholder="선택한 항목이 여기에 표시됩니다."></textarea>
  </div>

  <div class="card">
    <div class="card-title">계약 금액 및 구매자</div>
    <div class="field"><label>변경 후 최종 계약 금액</label><input id="final_price" type="text" value="150,000,000원(VAT포함)"></div>
    <div class="row" style="margin-top:10px;">
      <div class="field"><label>구매자명</label><input id="buyer_name" type="text" value="㈜이노메드"></div>
      <div class="field"><label>사업자번호</label><input id="biz_no" type="text" value="106-81-97189"></div>
    </div>
  </div>

  <button class="btn-generate" onclick="generateDoc()">📄 부속 합의서 다운로드</button>
</div>

<script>
function addRow(type) {
  const sel = document.getElementById(type + '_select').value;
  const qty = document.getElementById(type + '_qty').value;
  const [code, name] = sel.split(',');
  const target = document.getElementById(type + '_items');
  // 워드 표 형식에 맞게 텍스트 생성
  target.value += `${code} | ${name} | ${qty}개\n`;
}

async function generateDoc() {
  // 실제 JSZip 및 TEMPLATE_B64 연동 필요
  alert("입력하신 데이터로 워드 표 형식을 구성하여 다운로드를 시작합니다.");
}
</script>
</body>
</html>

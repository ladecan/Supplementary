<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부속합의서 생성기 | Candela Korea</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #d6cfc4;
    --border-light: #ebe7e1;
    --text-primary: #1a1814;
    --text-secondary: #5c5750;
    --text-muted: #9c9690;
    --accent: #2c4a7c;
    --accent-light: #e8edf5;
    --accent-hover: #1d3561;
    --success: #2d6a4f;
    --success-light: #e8f4ee;
    --danger: #8b2030;
    --danger-light: #f5e8ea;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header .divider { opacity: 0.3; }
  header .subtitle { font-size: 12px; opacity: 0.75; font-weight: 300; letter-spacing: 0.05em; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    height: calc(100vh - 52px);
    overflow: hidden;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .form-panel::-webkit-scrollbar { width: 4px; }
  .form-panel::-webkit-scrollbar-track { background: transparent; }
  .form-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .form-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-light);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }
  .form-header h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .form-header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .form-body { padding: 20px 24px; flex: 1; }

  /* ── SECTION ── */
  .section {
    margin-bottom: 24px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--accent-light);
    margin-bottom: 14px;
  }

  /* ── FIELD ── */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .field label .required { color: var(--danger); margin-left: 2px; }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: var(--text-primary);
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(44,74,124,0.1);
  }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 80px; gap: 8px; }

  /* ── ITEMS TABLE ── */
  .items-header {
    display: grid;
    grid-template-columns: 140px 1fr 60px 28px;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 0 0 6px 0;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 8px;
  }

  .item-row {
    display: grid;
    grid-template-columns: 140px 1fr 60px 28px;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .item-row input { font-size: 11px; padding: 6px 8px; }
  .item-row input[type="number"] { text-align: center; }

  .btn-remove {
    width: 28px; height: 28px;
    background: var(--danger-light);
    border: 1px solid #e0c0c5;
    border-radius: 4px;
    color: var(--danger);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-remove:hover { background: #f0d0d5; }

  .btn-add-row {
    width: 100%;
    padding: 7px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .btn-add-row:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ── AMOUNT ── */
  .amount-display {
    background: var(--accent-light);
    border: 1px solid #c5d3e8;
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .amount-display label { font-size: 11px; font-weight: 500; color: var(--accent); white-space: nowrap; }
  .amount-display input { background: transparent; border-color: #b0c4de; }

  /* ── GENERATE BUTTON ── */
  .form-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border-light);
    background: var(--surface);
    position: sticky;
    bottom: 0;
  }
  .btn-generate {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-generate:hover { background: var(--accent-hover); }
  .btn-generate:active { transform: scale(0.99); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    display: flex;
    flex-direction: column;
    background: #e8e4df;
    overflow: hidden;
  }

  .preview-toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }
  .preview-toolbar span {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .toolbar-actions { display: flex; gap: 8px; }

  .btn-toolbar {
    padding: 6px 14px;
    border-radius: var(--radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
  }
  .btn-toolbar:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-toolbar.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-toolbar.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .preview-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    justify-content: center;
  }
  .preview-scroll::-webkit-scrollbar { width: 5px; }
  .preview-scroll::-webkit-scrollbar-track { background: transparent; }
  .preview-scroll::-webkit-scrollbar-thumb { background: #c0bab4; border-radius: 3px; }

  /* ── DOCUMENT ── */
  .document {
    background: #fff;
    width: 720px;
    min-height: 900px;
    box-shadow: var(--shadow-lg);
    padding: 64px 72px;
    font-family: 'Noto Serif KR', serif;
    color: #1a1814;
    position: relative;
  }

  .doc-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-size: 80px;
    color: rgba(44,74,124,0.04);
    font-weight: 700;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.1em;
  }

  .doc-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 32px;
    border-bottom: 2.5px solid #1a1814;
    padding-bottom: 16px;
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .doc-meta { margin-bottom: 28px; }
  .doc-meta-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    line-height: 1.6;
  }
  .doc-meta-row .label { color: #5c5750; white-space: nowrap; min-width: 150px; }
  .doc-meta-row .value { font-weight: 500; border-bottom: 1px solid #aaa; flex: 1; }

  .doc-intro {
    font-size: 13px;
    line-height: 1.9;
    margin-bottom: 28px;
    color: #3a3630;
  }

  .doc-section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    counter-increment: section;
  }
  .doc-section-title::before { content: counter(section) ".  "; }

  .doc-body { counter-reset: section; }

  .doc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 20px;
  }
  .doc-table th {
    background: #f0ece7;
    border: 1px solid #c8c0b5;
    padding: 7px 10px;
    text-align: center;
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 0.02em;
  }
  .doc-table td {
    border: 1px solid #c8c0b5;
    padding: 7px 10px;
    text-align: center;
    font-size: 12px;
  }
  .doc-table td:nth-child(2) { text-align: left; }

  .section-gap { margin-bottom: 24px; }

  .doc-amount {
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1.5px solid #1a1814;
    display: inline;
  }

  .doc-closing {
    font-size: 12.5px;
    line-height: 2;
    color: #3a3630;
    margin: 24px 0 32px;
  }

  /* ── SIGNATURE TABLE ── */
  .sig-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 12px;
  }
  .sig-table td {
    border: 1px solid #c8c0b5;
    padding: 10px 14px;
    vertical-align: top;
    line-height: 1.8;
  }
  .sig-table .sig-header {
    background: #f0ece7;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
    padding: 10px;
  }
  .sig-table .sig-row td { height: 28px; }
  .sig-table .field-label { color: #5c5750; font-size: 11px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 12px;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--success);
    color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media print {
    header, .form-panel, .preview-toolbar { display: none !important; }
    .layout { display: block !important; }
    .preview-panel { background: white !important; }
    .preview-scroll { padding: 0 !important; }
    .document { box-shadow: none !important; width: 100% !important; padding: 20mm 25mm !important; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Syneron Candela Korea</div>
  <span class="divider">|</span>
  <span class="subtitle">부속합의서 생성기</span>
</header>

<div class="layout">
  <!-- FORM -->
  <aside class="form-panel">
    <div class="form-header">
      <h2>📄 합의서 정보 입력</h2>
      <p>항목을 입력하고 미리보기를 확인하세요</p>
    </div>

    <div class="form-body">

      <!-- 기본정보 -->
      <div class="section">
        <div class="section-label">기본 정보</div>
        <div class="field">
          <label>구매계약서 번호 <span class="required">*</span></label>
          <input type="text" id="contractNo" placeholder="예: 20241206001" value="20241206001">
        </div>
        <div class="field-row">
          <div class="field">
            <label>구매계약서 체결일자</label>
            <input type="date" id="contractDate" value="2024-12-06">
          </div>
          <div class="field">
            <label>부속합의 일자</label>
            <input type="date" id="addendumDate" value="2026-03-25">
          </div>
        </div>
      </div>

      <!-- 변경 전 구성품 -->
      <div class="section">
        <div class="section-label">변경 전 구성품</div>
        <div class="items-header">
          <span>구성품 번호</span>
          <span>구성품명</span>
          <span>수량</span>
          <span></span>
        </div>
        <div id="beforeItems"></div>
        <button class="btn-add-row" onclick="addItem('before')">+ 행 추가</button>
      </div>

      <!-- 변경 후 구성품 -->
      <div class="section">
        <div class="section-label">변경 후 구성품</div>
        <div class="items-header">
          <span>구성품 번호</span>
          <span>구성품명</span>
          <span>수량</span>
          <span></span>
        </div>
        <div id="afterItems"></div>
        <button class="btn-add-row" onclick="addItem('after')">+ 행 추가</button>
      </div>

      <!-- 계약금액 -->
      <div class="section">
        <div class="section-label">변경 후 최종 계약금액</div>
        <div class="field">
          <label>금액 (VAT 포함) <span class="required">*</span></label>
          <input type="text" id="contractAmount" placeholder="예: 150,000,000" value="150,000,000" oninput="formatAmount(this)">
        </div>
      </div>

      <!-- 판매자 -->
      <div class="section">
        <div class="section-label">판매자 (Candela Korea)</div>
        <div class="field">
          <label>회사명</label>
          <input type="text" id="sellerName" value="시너론 켄델라 코리아 유한회사">
        </div>
        <div class="field">
          <label>주소</label>
          <input type="text" id="sellerAddr" value="서울시 서초구 강남대로 327 대륭서초타워 3층 (우: 06627)">
        </div>
        <div class="field-row">
          <div class="field">
            <label>대표자명</label>
            <input type="text" id="sellerRep" value="유지쿠리키">
          </div>
          <div class="field">
            <label>사업자등록번호</label>
            <input type="text" id="sellerBizNo" value="729-87-01057">
          </div>
        </div>
        <div class="field">
          <label>법인등록번호</label>
          <input type="text" id="sellerCorpNo" value="110114-0225232">
        </div>
      </div>

      <!-- 구매자 -->
      <div class="section">
        <div class="section-label">구매자</div>
        <div class="field">
          <label>회사/병원명 <span class="required">*</span></label>
          <input type="text" id="buyerName" value="㈜이노메드">
        </div>
        <div class="field">
          <label>주소</label>
          <input type="text" id="buyerAddr" value="서울시 용산구 한강대로 257 2층,4층(갈월동,청룡빌딩) (04322)">
        </div>
        <div class="field-row">
          <div class="field">
            <label>성명/직책</label>
            <input type="text" id="buyerRep" placeholder="홍길동 / 대표">
          </div>
          <div class="field">
            <label>사업자등록번호</label>
            <input type="text" id="buyerBizNo" value="106-81-97189">
          </div>
        </div>
      </div>

    </div><!-- /form-body -->

    <div class="form-footer">
      <button class="btn-generate" onclick="generate()">📋 미리보기 생성</button>
    </div>
  </aside>

  <!-- PREVIEW -->
  <main class="preview-panel">
    <div class="preview-toolbar">
      <span>📄 미리보기</span>
      <div class="toolbar-actions">
        <button class="btn-toolbar" onclick="window.print()">🖨️ 인쇄</button>
        <button class="btn-toolbar primary" onclick="generate()">🔄 새로고침</button>
      </div>
    </div>
    <div class="preview-scroll" id="previewScroll">
      <div class="empty-state" id="emptyState">
        <div class="icon">📄</div>
        <p>왼쪽에서 정보를 입력하고 <strong>미리보기 생성</strong>을 클릭하세요</p>
      </div>
      <div id="docWrapper" style="display:none"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 초기 데이터 ──
const defaultBefore = [
  { no: "7123-CE-0650", name: "GMPP DCD Small", qty: 1 },
  { no: "7123-CE-0632", name: "GMPP DCD Medium", qty: 1 },
  { no: "7123-CE-0653", name: "GMPP ACC Large", qty: 1 },
];
const defaultAfter = [
  { no: "FIN101958", name: "GMPP Modified LSDS Options Kit for DCD", qty: 2 },
];

let beforeItems = [...defaultBefore];
let afterItems = [...defaultAfter];

function renderItems(arr, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  arr.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input type="text" placeholder="구성품 번호" value="${item.no}" oninput="updateItem('${containerId}',${i},'no',this.value)">
      <input type="text" placeholder="구성품명" value="${item.name}" oninput="updateItem('${containerId}',${i},'name',this.value)">
      <input type="number" placeholder="수량" value="${item.qty}" min="1" oninput="updateItem('${containerId}',${i},'qty',this.value)">
      <button class="btn-remove" onclick="removeItem('${containerId}',${i})" title="삭제">×</button>
    `;
    container.appendChild(row);
  });
}

function updateItem(containerId, idx, field, val) {
  const arr = containerId === 'beforeItems' ? beforeItems : afterItems;
  arr[idx][field] = field === 'qty' ? parseInt(val)||1 : val;
}

function addItem(type) {
  const arr = type === 'before' ? beforeItems : afterItems;
  const containerId = type === 'before' ? 'beforeItems' : 'afterItems';
  arr.push({ no: '', name: '', qty: 1 });
  renderItems(arr, containerId);
}

function removeItem(containerId, idx) {
  const arr = containerId === 'beforeItems' ? beforeItems : afterItems;
  arr.splice(idx, 1);
  renderItems(arr, containerId);
}

function formatAmount(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  el.value = raw ? parseInt(raw).toLocaleString('ko-KR') : '';
}

function formatDateKo(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}

function tableRows(arr) {
  return arr.map(item => `
    <tr>
      <td>${item.no || ''}</td>
      <td>${item.name || ''}</td>
      <td>${item.qty || 1}</td>
    </tr>
  `).join('');
}

function generate() {
  const v = id => document.getElementById(id).value;

  const contractNo    = v('contractNo');
  const contractDate  = formatDateKo(v('contractDate'));
  const addendumDate  = formatDateKo(v('addendumDate'));
  const amount        = v('contractAmount');
  const sellerName    = v('sellerName');
  const sellerAddr    = v('sellerAddr');
  const sellerRep     = v('sellerRep');
  const sellerBizNo   = v('sellerBizNo');
  const sellerCorpNo  = v('sellerCorpNo');
  const buyerName     = v('buyerName');
  const buyerAddr     = v('buyerAddr');
  const buyerRep      = v('buyerRep');
  const buyerBizNo    = v('buyerBizNo');

  const html = `
  <div class="document">

  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

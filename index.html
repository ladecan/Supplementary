<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Candela 부속 합의서 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  /* 기존 스타일 유지 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
  :root { --bg: #f4f6fb; --surface: #ffffff; --border: #e4e8f3; --accent: #6c4ff5; --text: #1a1d2e; --radius: 10px; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); padding: 32px 16px; }
  .container { max-width: 760px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 11px; font-weight: 600; color: #7a8099; }
  input, select, textarea { border: 1px solid var(--border); border-radius: 7px; padding: 10px; font-size: 13px; width: 100%; }
  .btn-add { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 5px; }
  .btn-generate { width: 100%; padding: 16px; background: linear-gradient(135deg, #3b7ef8, #6c4ff5); border: none; border-radius: var(--radius); color: white; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2 style="font-size:18px; margin-bottom:20px;">부속 합의서 정보</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
      <div class="field"><label>계약서 번호</label><input id="contract_no" type="text" value="20241206001"></div>
      <div class="field"><label>원 계약 체결일</label><input id="contract_date" type="text" value="2024년 12월 6일"></div>
    </div>
  </div>

  <div class="card">
    <div style="color:var(--accent); font-size:12px; font-weight:700; margin-bottom:10px;">구성품 빠른 선택</div>
    <div style="display:flex; gap:10px; align-items:flex-end; background:#f8f9ff; padding:15px; border-radius:8px;">
      <div style="flex:2;" class="field">
        <label>항목 선택</label>
        <select id="item_select">
          <option value="7123-CE-0650,GMPP DCD Small">7123-CE-0650 (GMPP DCD Small)</option>
          <option value="7123-CE-0632,GMPP DCD Medium">7123-CE-0632 (GMPP DCD Medium)</option>
          <option value="7123-CE-0652,GMPP DCD Large">7123-CE-0652 (GMPP DCD Large)</option>
          <option value="7123-CE-0653,GMPP ACC Large">7123-CE-0653 (GMPP ACC Large)</option>
          <option value="FIN100834,PicoWay Zoom">FIN100834 (PicoWay Zoom)</option>
          <option value="FIN101958,GMPP Modified LSDS">FIN101958 (Modified LSDS)</option>
        </select>
      </div>
      <div style="flex:0.5;" class="field">
        <label>수량</label>
        <input id="item_qty" type="number" value="1">
      </div>
      <div style="display:flex; gap:5px; margin-bottom:14px;">
        <button class="btn-add" onclick="addItem('ori')">기존에 추가</button>
        <button class="btn-add" style="background:#3b7ef8;" onclick="addItem('new')">신규에 추가</button>
      </div>
    </div>

    <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:15px;">
      <div class="field"><label>변경 전 구성품 (목록)</label><textarea id="ori_items" rows="5"></textarea></div>
      <div class="field"><label>변경 후 구성품 (목록)</label><textarea id="new_items" rows="5"></textarea></div>
    </div>
  </div>

  <div class="card">
    <div class="field"><label>최종 계약 금액</label><input id="final_price" type="text" value="150,000,000원(VAT포함)"></div>
  </div>

  <button class="btn-generate" onclick="generateAddon()">📄 부속 합의서 다운로드</button>
</div>

<script>
// 항목 추가 로직
function addItem(target) {
  const sel = document.getElementById('item_select').value;
  const qty = document.getElementById('item_qty').value;
  const [code, name] = sel.split(',');
  const textArea = document.getElementById(target + '_items');
  textArea.value += `${code}, ${name}, ${qty}\n`;
}

  // 파일 생성 로직 (기존 소스코드의 generateDocx와 동일하게 연결)

}
</script>
</body>
</html>

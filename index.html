<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부속합의서 생성기 | Candela Korea</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap');
:root{
  --navy:#1e3a5f;--navy-lt:#e8edf5;--navy-xl:#f2f5fa;
  --gold:#b8966e;--gold-dk:#9a7a58;
  --surf:#fff;--bg:#f0eeeb;--bdr:#dbd6cf;--bdr-lt:#ece9e4;
  --tx:#1c1a18;--tx2:#4a4640;--tx3:#8a8480;
  --red:#8b2030;--red-lt:#faeaec;
  --grn:#2d5f3f;--grn-lt:#e6f2ec;
  --shl:0 12px 48px rgba(0,0,0,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--navy);color:#fff;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hd-l{display:flex;align-items:center;gap:12px}
.hd-brand{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;letter-spacing:.03em}
.hd-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.7}
.hd-sub{font-size:11px;opacity:.6;font-weight:300;letter-spacing:.06em}
.btn-word{display:flex;align-items:center;gap:7px;padding:7px 18px;background:var(--gold);color:#fff;border:none;border-radius:5px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(184,150,110,.35)}
.btn-word:hover{background:var(--gold-dk);transform:translateY(-1px)}
.btn-word:disabled{opacity:.6;cursor:not-allowed;transform:none}
.layout{display:grid;grid-template-columns:410px 1fr;flex:1;overflow:hidden}
.form-panel{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.form-scroll{flex:1;overflow-y:auto;padding:16px 18px}
.form-scroll::-webkit-scrollbar{width:4px}
.form-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.sec{margin-bottom:18px}
.sec-hd{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);padding-bottom:7px;border-bottom:1.5px solid var(--navy-lt);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.sec-hd::before{content:'';display:block;width:3px;height:11px;background:var(--navy);border-radius:2px}
.f{margin-bottom:8px}
.f label{display:block;font-size:10.5px;font-weight:500;color:var(--tx2);margin-bottom:3px}
.req{color:var(--red)}
.f input,.f select,input.ci,select.cs{width:100%;padding:6px 9px;border:1px solid var(--bdr);border-radius:5px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--tx);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.f input:focus,.f select:focus,input.ci:focus,select.cs:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.buyer-chips{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--navy);color:var(--navy)}
.chip.on{border-color:var(--navy);background:var(--navy);color:#fff}
.tbl-hd{display:grid;grid-template-columns:138px 1fr 52px 26px;gap:5px;font-size:9.5px;font-weight:600;color:var(--tx3);padding-bottom:5px;border-bottom:1px solid var(--bdr-lt);margin-bottom:6px}
.item-r{display:grid;grid-template-columns:138px 1fr 52px 26px;gap:5px;margin-bottom:5px;align-items:start}
.item-r select.cs,.item-r input.ci{font-size:11px;padding:5px 6px}
.item-r input[type=number]{text-align:center}
.btn-del{width:26px;height:26px;background:var(--red-lt);border:1px solid #e0c0c5;border-radius:4px;color:var(--red);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;flex-shrink:0}
.btn-del:hover{background:#f5d0d5}
.btn-add{width:100%;margin-top:4px;padding:6px;border:1.5px dashed var(--bdr);border-radius:5px;background:transparent;color:var(--tx3);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}
.btn-add:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-xl)}
.preview-panel{display:flex;flex-direction:column;background:#e4e0da;overflow:hidden}
.pbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pbar-l{display:flex;align-items:center;gap:8px}
.pbar-lbl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase}
.badge{font-size:9px;font-weight:600;background:var(--grn-lt);color:var(--grn);border:1px solid #b0d8be;border-radius:20px;padding:1px 8px}
.btn-print{padding:5px 13px;border:1px solid var(--bdr);border-radius:5px;background:var(--surf);color:var(--tx2);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .15s}
.btn-print:hover{border-color:var(--navy);color:var(--navy)}
.prev-scroll{flex:1;overflow-y:auto;padding:28px;display:flex;justify-content:center}
.prev-scroll::-webkit-scrollbar{width:5px}
.prev-scroll::-webkit-scrollbar-thumb{background:#bab5ae;border-radius:3px}
.doc{background:#fff;width:700px;min-height:900px;box-shadow:var(--shl);padding:55px 65px;font-family:'Noto Serif KR',serif;color:#1c1a18;position:relative;font-size:13px;line-height:1.6}
.doc-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-28deg);font-size:70px;font-weight:700;color:rgba(30,58,95,.035);white-space:nowrap;pointer-events:none;letter-spacing:.1em}
.doc-title{text-align:center;font-size:24px;font-weight:700;letter-spacing:.2em;padding-bottom:12px;margin-bottom:22px;text-decoration:underline;text-underline-offset:5px;border-bottom:2.5px solid #1c1a18}
.doc-meta{margin-bottom:20px}
.doc-meta-row{display:flex;margin-bottom:4px;font-size:12.5px;line-height:1.8;font-family:'Noto Sans KR',sans-serif}
.doc-meta-lbl{min-width:130px;color:#555}
.doc-meta-colon{margin-right:6px;color:#555}
.doc-meta-val{border-bottom:1px solid #888;padding:0 4px 1px;font-weight:500;min-width:120px}
.doc-intro{font-size:12px;line-height:1.9;margin-bottom:18px;font-family:'Noto Sans KR',sans-serif;color:#333}
.doc-snum{font-weight:600;font-size:13px;margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;display:flex;gap:6px}
.doc-sub{font-weight:600;font-size:12.5px;margin:12px 0 8px 22px;font-family:'Noto Sans KR',sans-serif}
.doc-tbl{width:100%;border-collapse:collapse;margin-bottom:4px;font-size:11.5px;font-family:'Noto Sans KR',sans-serif}
.doc-tbl th{background:#f0ece5;border:1px solid #bbb;padding:5px 9px;text-align:center;font-weight:600;font-size:11px}
.doc-tbl td{border:1px solid #bbb;padding:5px 9px}
.doc-tbl td.c{text-align:center}
.doc-amount{font-size:13px;font-weight:600;margin-bottom:20px;font-family:'Noto Sans KR',sans-serif;display:flex;gap:6px}
.doc-ul{border-bottom:1.5px solid #1c1a18}
.doc-closing{font-size:11.5px;line-height:2;color:#333;margin-bottom:24px;font-family:'Noto Sans KR',sans-serif}
.sig-tbl{width:100%;border-collapse:collapse;font-size:11.5px;font-family:'Noto Sans KR',sans-serif;border:2px solid #888}
.sig-tbl td{border:1.5px solid #888;padding:8px 12px;vertical-align:middle;line-height:1.8}
.sig-tbl td.hd{font-weight:600;font-size:12px}
.sig-tbl td.center{text-align:center}
.sig-lbl{color:#666;font-size:10.5px}
.toast{position:fixed;bottom:22px;right:22px;color:#fff;padding:10px 18px;border-radius:6px;font-size:12px;font-weight:500;box-shadow:var(--shl);transform:translateY(50px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media print{header,.form-panel,.pbar{display:none!important}.layout{display:block!important}.prev-scroll{padding:0!important}.doc{box-shadow:none!important;width:100%!important;padding:15mm 18mm!important}}
</style>
<!-- 다음 주소검색 API (인터넷 연결 시 사용 가능) -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<header>
  <div class="hd-l">
    <span class="hd-brand">Syneron Candela Korea</span>
    <div class="hd-dot"></div>
    <span class="hd-sub">부속합의서 생성기</span>
  </div>
  <button class="btn-word" id="wBtn" onclick="exportWord()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    Word로 저장
  </button>
</header>
<div class="layout">
<aside class="form-panel">
<div class="form-scroll">
  <div class="sec">
    <div class="sec-hd">기본 정보</div>
    <div class="f"><label>구매계약서 번호 <span class="req">*</span></label><input type="text" id="cNo" value="20241206001" oninput="render()"></div>
    <div class="row2">
      <div class="f"><label>계약서 체결일자</label><input type="date" id="cDate" value="2024-12-06" onchange="render()"></div>
      <div class="f"><label>부속합의 일자</label><input type="date" id="aDate" value="2026-03-25" onchange="render()"></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-hd">변경 전 구성품</div>
    <div class="tbl-hd"><span>구성품 번호</span><span>구성품명</span><span style="text-align:center">수량</span><span></span></div>
    <div id="bRows"></div>
    <button class="btn-add" onclick="addRow('b')">＋ 행 추가</button>
  </div>
  <div class="sec">
    <div class="sec-hd">변경 후 구성품</div>
    <div class="tbl-hd"><span>구성품 번호</span><span>구성품명</span><span style="text-align:center">수량</span><span></span></div>
    <div id="aRows"></div>
    <button class="btn-add" onclick="addRow('a')">＋ 행 추가</button>
  </div>
  <div class="sec">
    <div class="sec-hd">최종 계약금액</div>
    <div class="f"><label>변경 후 금액 (VAT 포함) <span class="req">*</span></label><input type="text" id="amt" value="150,000,000" oninput="fmtAmt(this);render()"></div>
  </div>
  <div class="sec">
    <div class="sec-hd">판매자 (Candela Korea)</div>
    <div class="f"><label>회사명</label><input type="text" id="sName" value="시너론 켄델라 코리아 유한회사" oninput="render()"></div>
    <div class="f"><label>주소</label><input type="text" id="sAddr" value="서울시 서초구 강남대로 327 대륭서초타워 3층 (우: 06627)" oninput="render()"></div>
    <div class="row2">
      <div class="f"><label>대표자명</label><input type="text" id="sRep" value="유지쿠리키" oninput="render()"></div>
      <div class="f"><label>사업자등록번호</label><input type="text" id="sBiz" value="729-87-01057" oninput="fmtBiz(this);render()" maxlength="12"></div>
    </div>
    <div class="f"><label>법인등록번호</label><input type="text" id="sCorp" value="110114-0225232" oninput="render()"></div>
  </div>
  <div class="sec">
    <div class="sec-hd">구매자</div>
    <div class="buyer-chips">
      <button class="chip on" onclick="setBuyer('inomed',this)">㈜이노메드</button>
      <button class="chip" onclick="setBuyer('sevenu',this)">쎄븐유</button>
      <button class="chip" onclick="setBuyer('custom',this)">직접 입력</button>
    </div>
    <div class="f"><label>회사 / 병원명 <span class="req">*</span></label><input type="text" id="bName" oninput="markCustom();render()"></div>
    <div class="f">
      <label>주소</label>
      <div style="display:flex;gap:6px">
        <input type="text" id="bAddr1" placeholder="주소 (도로명 또는 지번)" oninput="render()" style="flex:1">
        <button onclick="searchAddr()" style="padding:6px 12px;background:var(--navy);color:#fff;border:none;border-radius:5px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">🔍 주소검색</button>
      </div>
      <input type="hidden" id="bAddr2" value="">
    </div>
    <div class="row2">
      <div class="f"><label>성명 / 직책</label><input type="text" id="bRep" oninput="render()"></div>
      <div class="f"><label>사업자등록번호</label><input type="text" id="bBiz" oninput="fmtBiz(this);render()" maxlength="12" placeholder="000-00-00000"></div>
    </div>
  </div>
</div>
</aside>
<main class="preview-panel">
  <div class="pbar">
    <div class="pbar-l"><span class="pbar-lbl">미리보기</span><span class="badge">● LIVE</span></div>
    <button class="btn-print" onclick="window.print()">🖨️ 인쇄</button>
  </div>
  <div class="prev-scroll"><div class="doc" id="doc"></div></div>
</main>
</div>
<div class="toast" id="toast"></div>

function searchAddr() {
  // 다음 주소 API가 로드됐는지 확인
  if (typeof daum === "undefined" || !daum.Postcode) {
    toast("주소검색은 인터넷 연결이 필요합니다", false);
    return;
  }
  new daum.Postcode({
    oncomplete: function(data) {
      // 도로명 주소 우선, 없으면 지번
      const addr1 = data.roadAddress || data.jibunAddress;
      // 전체 주소 (우편번호 포함) 한 줄로
      document.getElementById("bAddr1").value = addr1 + " (" + data.zonecode + ")";
      document.getElementById("bAddr2").value = "";
      // 구매자 칩을 직접입력으로 전환
      markCustom();
      render();
    },
    theme: {
      bgColor: "#1e3a5f",
      titleColor: "#ffffff",
      searchBgColor: "#2c4e7a",
      queryTextColor: "#ffffff",
    }
  }).open();
}

function fmtBiz(el){
  const n=el.value.replace(/[^0-9]/g,"");
  if(n.length<=3) el.value=n;
  else if(n.length<=5) el.value=n.slice(0,3)+"-"+n.slice(3);
  else el.value=n.slice(0,3)+"-"+n.slice(3,5)+"-"+n.slice(5,10);
}

    wrap.appendChild(dB);
    el.appendChild(wrap);
  });
}

// ── XML 내 텍스트 치환 ────────────────────────────────────────────
function replaceInXml(xml, oldText, newText, count=1) {
  const tag = `>${oldText}<`;
  const rep = `>${newText}<`;
  let result = xml, n = 0;
  let idx = result.indexOf(tag);
  while (idx !== -1 && (count === 0 || n < count)) {
    result = result.slice(0, idx) + rep + result.slice(idx + tag.length);
    n++;
    idx = result.indexOf(tag, idx + rep.length);
  }
  return result;
}

// ── 행 삭제 헬퍼 (paraId로 w:tr 전체 제거) ──────────────────────
function deleteRow(xml, paraId) {
  const marker = `w14:paraId="${paraId}"`;
  const idx = xml.indexOf(marker);
  if (idx === -1) return xml;
  const trStart = xml.lastIndexOf('<w:tr ', idx);
  const trEnd = xml.indexOf('</w:tr>', trStart) + 7;
  if (trStart === -1 || trEnd < 7) return xml;
  return xml.slice(0, trStart) + xml.slice(trEnd);
}

// ── 특정 행 내에서 문자열 교체 ────────────────────────────────────
function replaceInRow(xml, paraId, oldStr, newStr) {
  const marker = `w14:paraId="${paraId}"`;
  const idx = xml.indexOf(marker);
  if (idx === -1) return xml;
  const trStart = xml.lastIndexOf('<w:tr ', idx);
  const trEnd = xml.indexOf('</w:tr>', trStart) + 7;
  const row = xml.slice(trStart, trEnd);
  const newRow = row.replace(oldStr, newStr);
  return xml.slice(0, trStart) + newRow + xml.slice(trEnd);
}

// ── SDT 드롭다운 현재값 치환 ──────────────────────────────────────
function replaceSdtValue(xml, sdtIndex, newValue) {
  // w:sdt 블록을 순서대로 찾아서 sdtContent 내 w:t를 교체
  let pos = 0, count = 0;
  while (pos < xml.length) {
    const start = xml.indexOf("<w:sdt>", pos);
    if (start === -1) break;
    const end = xml.indexOf("</w:sdt>", start);
    if (end === -1) break;
    if (count === sdtIndex) {
      const block = xml.slice(start, end + 8);
      // sdtContent 내부의 w:t 교체
      const contentStart = block.indexOf("<w:sdtContent>");
      if (contentStart !== -1) {
        const tStart = block.indexOf("<w:t>", contentStart);
        const tEnd = block.indexOf("</w:t>", tStart);
        if (tStart !== -1 && tEnd !== -1) {
          const newBlock = block.slice(0, tStart + 5) + newValue + block.slice(tEnd);
          return xml.slice(0, start) + newBlock + xml.slice(end + 8);
        }
        // xml:space preserve 버전
        const tStart2 = block.indexOf("<w:t xml:space=", contentStart);
        const tEnd2 = block.indexOf("</w:t>", tStart2);
        if (tStart2 !== -1 && tEnd2 !== -1) {
          const gt = block.indexOf(">", tStart2);
          const newBlock = block.slice(0, gt + 1) + newValue + block.slice(tEnd2);
          return xml.slice(0, start) + newBlock + xml.slice(end + 8);
        }
      }
      break;
    }
    count++;
    pos = end + 8;
  }
  return xml;
}

// ── Word 저장 (원본 docx XML 수정) ───────────────────────────────
async function exportWord() {
  const btn = $("wBtn");
  btn.textContent = "⏳ 생성 중...";
  btn.disabled = true;
  try {
    // 1. 원본 template 로드
    const zip = await JSZip.loadAsync(TEMPLATE_B64, {base64: true});
    let xml = await zip.file("word/document.xml").async("string");

    // 2. 계약서 번호
    xml = replaceInXml(xml, "20241206001", val("cNo"), 1);

    // 3. 계약서 체결일 (2024년 / 12 / 월 / 6 / 일)
    const [cy,cm,cd] = val("cDate").split("-");
    xml = replaceInXml(xml, "2024년 ", cy + "년 ", 1);
    xml = replaceInXml(xml, ">12<", ">" + (+cm) + "<", 1); // 탭 이후 첫 번째 12
    // 계약일 '6' 치환 (월 뒤에 나오는 첫 번째 숫자)
    const cMonthPos = xml.indexOf(cy + "년 ");
    let tmp = xml.slice(0, cMonthPos) + xml.slice(cMonthPos).replace(">" + (+cm) + "<", ">__CMONTH__<");
    // 일 치환
    xml = tmp.replace(">6<", ">" + (+cd) + "<").replace(">__CMONTH__<", ">" + (+cm) + "<");

    // 4. 부속합의 일자
    const [ay,am_n,ad] = val("aDate").split("-");
    // 원본: '202' '6' '년' '3' '월' '25' '일' 분산
    xml = xml.replace(">202<", ">" + ay.slice(0,3) + "<");
    // 두 번째 등장하는 6 (부속합의 년도의 마지막 숫자)
    let sixCount = 0;
    xml = xml.replace(/>(\d)<\/w:t>/g, (m, d) => {
      if (d === "6" && sixCount === 0) { sixCount++; return m; } // 계약일 6일은 skip
      if (d === "6" && sixCount === 1) { sixCount++; return ">" + ay.slice(3) + "</w:t>"; }
      return m;
    });
    xml = replaceInXml(xml, "3", (+am_n).toString(), 1); // 월
    xml = replaceInXml(xml, "25", (+ad).toString(), 1);  // 일

    // 5. 금액
    xml = replaceInXml(xml, "150,000,000", val("amt"), 1);

    // 6+7. 모든 SDT 교체를 먼저 처리 (행 삭제 전에 해야 인덱스가 맞음)
    // 변경 전 구성품 (SDT 0~5)
    const bLen = bIt.length;
    for (let i = 0; i < 3; i++) {
      const item = bIt[i] || {no:"",name:"",qty:1};
      xml = replaceSdtValue(xml, i*2,   item.no);
      xml = replaceSdtValue(xml, i*2+1, item.name);
    }
    // 변경 후 구성품: ROW5_TEMPLATE를 aIt 개수만큼 복제해서 원본 row5 교체
    {
      const row5Marker = 'w14:paraId="3E0A94CA"';
      const row5Start = xml.lastIndexOf('<w:tr ', xml.indexOf(row5Marker));
      const row5End = xml.indexOf('</w:tr>', row5Start) + 7;
      const row5Orig = xml.slice(row5Start, row5End);
      
      let newRows = "";
      for (let i = 0; i < aIt.length; i++) {
        const item = aIt[i];
        let r = ROW5_TEMPLATE;
        // paraId/textId 교체 (고유값)
        r = r.replace(/w14:paraId="[^"]+"/g, `w14:paraId="BB${String(i).padStart(6,'0')}"`);
        r = r.replace(/w14:textId="[^"]+"/g, `w14:textId="BB${String(i).padStart(6,'0')}"`);
        // SDT w:id 교체
        let idCount = 0;
        r = r.replace(/<w:id w:val="[^"]+"/g, () => `<w:id w:val="${Math.abs(i*1000+idCount++)}"`);
        // SDT 0(번호), SDT 1(이름) 교체
        r = replaceSdtValue(r, 0, item.no || "");
        r = replaceSdtValue(r, 1, item.name || "");
        // 수량 교체 (<w:t>숫자</w:t> 첫 번째)
        r = r.replace(/<w:t>\d+<\/w:t>/, `<w:t>${item.qty}</w:t>`);
        newRows += r;
      }
      xml = xml.slice(0, row5Start) + newRows + xml.slice(row5End);
    }

    // 변경 전 수량 1,1,1 치환 (paraId=49B8A414가 row1 시작, 각 수량 셀은 마지막 <w:t>숫자</w:t>)
    // 수량 셀은 SDT 밖 마지막 <w:tc>에 있는 <w:t>숫자</w:t>
    // 간단 방법: 변경전 테이블 전체에서 순서대로 <w:t>숫자</w:t> 교체
    let qCount = 0;
    xml = xml.replace(/<w:t>(\d+)<\/w:t>/g, (m, d) => {
      if (d === "1" && qCount < 3) {
        const q = bIt[qCount] ? String(bIt[qCount].qty) : "1";
        qCount++;
        return `<w:t>${q}</w:t>`;
      }
      return m;
    });

    // (변경 후 수량은 위에서 처리됨)

    // 변경 전 불필요한 행 삭제 (뒤에서부터 삭제해야 인덱스 안 꼬임)
    // row3(17FDAA9F)=3번째행, row2(15333852)=2번째행
    if (bLen <= 2) xml = deleteRow(xml, "17FDAA9F"); // 3번째 행 삭제
    if (bLen <= 1) xml = deleteRow(xml, "15333852"); // 2번째 행도 삭제

    // 8. 구매자명 치환
    // 원본 XML: <w:t>㈜</w:t> ... <w:t>이노메드</w:t> 별도 run
    const bNameFull = val("bName").trim();
    const hasKakho = bNameFull.startsWith("㈜") || bNameFull.startsWith("(주)");
    const bNameBody = bNameFull.replace(/^[㈜(주)]+/, "").trim();
    // ㈜ run: 입력값에 ㈜ 없으면 비움, 있으면 ㈜ 유지
    if (!hasKakho) {
      xml = replaceInXml(xml, "㈜", "", 1);
    }
    // 이노메드 run을 나머지 이름으로 교체
    xml = replaceInXml(xml, "이노메드", bNameBody || bNameFull, 1);

    // 9. 구매자 주소 (한 줄로 통합 — 원본 첫 번째 문단에 전체 주소, 두 번째 문단은 비움)
    const newAddr1 = val("bAddr1");
    xml = xml.replace("서울시 용산구 한강대로 257 ", (newAddr1 || "서울시 용산구 한강대로 257 ") + " ");
    xml = xml.replace("2층,4층(갈월동,청룡빌딩) (04322)", "");

    // 10. 구매자 사업자번호
    xml = replaceInXml(xml, "106-81-97189", val("bBiz") || "106-81-97189", 1);

    // 11. 구매자 성명 — 공백 run들을 이름으로 교체
    // 원본 셀: [' ']['   ']['              '][' ']['     (']['인'][') ']
    // 이 패턴은 문서에서 이 위치에만 존재하므로 단순 문자열 치환으로 처리
    const repName = val("bRep") || "";
    // run1(' ') → 이름으로, run2('   ') → 빈칸, run3('              ') → 빈칸, run4(' ') → 빈칸
    xml = xml
      .replace('xml:space="preserve"> </w:t></w:r><w:r w:rsidR="00E24BF4">', 
               `xml:space="preserve">         ${repName}</w:t></w:r><w:r w:rsidR="00E24BF4">`)
      .replace('xml:space="preserve">   </w:t>',
               'xml:space="preserve"></w:t>')
      .replace(
        'xml:space="preserve">              </w:t></w:r><w:r w:rsidRPr="008A09BA"><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:eastAsia="Malgun Gothic" w:hAnsi="Malgun Gothic" w:cs="Malgun Gothic Semilight"/><w:spacing w:val="3"/><w:sz w:val="20"/><w:szCs w:val="20"/><w:lang w:eastAsia="ko-KR"/></w:rPr><w:t xml:space="preserve"> </w:t>',
        'xml:space="preserve"></w:t></w:r><w:r w:rsidRPr="008A09BA"><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:eastAsia="Malgun Gothic" w:hAnsi="Malgun Gothic" w:cs="Malgun Gothic Semilight"/><w:spacing w:val="3"/><w:sz w:val="20"/><w:szCs w:val="20"/><w:lang w:eastAsia="ko-KR"/></w:rPr><w:t xml:space="preserve"></w:t>'
      );

    // 12. ZIP 업데이트 후 blob 생성
    zip.file("word/document.xml", xml);
    const blob = await zip.generateAsync({type:"blob", mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const buyShort = val("bName").replace(/[㈜()]/g,"").trim().slice(0,6);
    const ds = val("aDate").replace(/-/g,"");
    a.download = `부속합의서_${buyShort}_${ds}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    toast("✓ Word 파일이 저장되었습니다");
  } catch(e) {
    console.error(e);
    toast("⚠ 오류: " + e.message, false);
  } finally {
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>Word로 저장';
    btn.disabled = false;
  }
}

  renderRows(bIt,"bRows",NUMS_B,NAMES_B);
